{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion du profil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="apple-touch-icon" sizes="76x76" href="{% static 'img/apple-icon.png' %}">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <link href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,800" rel="stylesheet">
    <link href="https://demos.creative-tim.com/soft-ui-dashboard/assets/css/nucleo-icons.css" rel="stylesheet">
    <link href="https://demos.creative-tim.com/soft-ui-dashboard/assets/css/nucleo-svg.css" rel="stylesheet">
    <link id="pagestyle" href="{% static 'css/soft-ui-dashboard.css' %}" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 40px;
            color: #333;
            position: relative; /* nécessaire pour le bouton en absolute */
        }

        /* Bouton de déconnexion en haut à droite, plus grand et plus large */
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 14px 28px;  /* plus grand */
            font-size: 17px;     /* légèrement plus grand */
            min-width: 150px;    /* largeur minimum */
        }

        form {
            margin-top: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px 40px;
            max-width: 1000px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        input, textarea {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="file"] {
            border: none;
            padding: 6px 0;
        }

        input[type="submit"], button {
            background-color: #2d6cdf;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
        }

        input[type="submit"]:hover, button:hover {
            background-color: #1b4ea1;
        }

        hr {
            margin: 30px 0;
        }
    </style>
</head>
<body >

    <!-- Bouton de déconnexion -->
    <a href="{% url 'logout_user' %}" class="btn btn-sm btn-round mb-0 me-1 bg-gradient-light logout-btn">Déconnexion</a>

    <h1>Mon profil utilisateur</h1>

    <h2>Informations actuelles</h2>
    <p><strong>Prénom :</strong> Jean</p>
    <p><strong>Nom de famille :</strong> Dupont</p>
    <p><strong>Numéro de téléphone :</strong> +33 6 12 34 56 78</p>
    <p><strong>Ville :</strong> Paris</p>
    <p><strong>Biographie :</strong> Passionné d’informatique et de nouvelles technologies.</p>

    <hr>

    <h2>Modifier mes informations</h2>

    <form action="update_profile.html" method="post" enctype="multipart/form-data">
        <div class="form-grid">
            <div class="form-group">
                <label for="photo">Photo de profil :</label>
                <input type="file" id="photo" name="photo" placeholder="ajouter une image">
            </div>

            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" placeholder="Jean">
            </div>

            <div class="form-group">
                <label for="nom">Nom de famille :</label>
                <input type="text" id="nom" name="nom" placeholder="Dupont">
            </div>

            <div class="form-group">
                <label for="telephone">Numéro de téléphone :</label>
                <input type="tel" id="telephone" name="telephone" placeholder="+33 6 12 34 56 78">
            </div>

            <div class="form-group">
                <label for="ville">Ville :</label>
                <input type="text" id="ville" name="ville" placeholder="Abidjan">
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
                <label for="biographie">Biographie :</label>
                <textarea id="biographie" name="biographie" placeholder="Votr Biographie"></textarea>
            </div>
        </div>

        <br>
        <button type="submit">Enregistre</button>
    </form>

</body>
</html>
